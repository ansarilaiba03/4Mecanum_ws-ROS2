joy_teleop:
  ros__parameters:
    move:
      type: topic
      interface_type: geometry_msgs/msg/TwistStamped
      topic_name: /mecanum_drive_controller/reference

      deadman_buttons: [5]

      axis_mappings:
        twist-linear-x:
          axis: 1
          scale: 0.9 
          offset: 0.0
        twist-linear-y:
          axis: 0
          scale: 0.9 
          offset: 0.0
        twist-angular-z:
          axis: 3
          scale: 0.9
          offset: 0.0
